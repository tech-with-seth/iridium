name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

env:
    DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iridium_test
    VOLTAGENT_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/voltagent_test
    BETTER_AUTH_SECRET: test-secret-do-not-use-in-production!!
    BETTER_AUTH_BASE_URL: http://localhost:5173
    ANTHROPIC_API_KEY: test-key-not-used-in-e2e

jobs:
    validate:
        name: Typecheck + Lint + Format
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Generate Prisma client
              run: bunx --bun prisma generate
            - name: Validate
              run: bun run validate

    unit:
        name: Unit Tests
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Generate Prisma client
              run: bunx --bun prisma generate
            - name: Run unit tests
              run: bun run test

    e2e:
        name: Playwright
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: [validate, unit]

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: iridium_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            voltagent:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: voltagent_test
                ports:
                    - 5433:5432
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Generate Prisma client
              run: bunx --bun prisma generate

            - name: Run migrations
              run: bunx --bun prisma migrate deploy

            - name: Install Playwright browsers
              run: bunx playwright install --with-deps chromium

            - name: Run e2e tests
              run: bunx playwright test --project=chromium

            # Upload before the visual run: a second `playwright test`
            # invocation rewrites playwright-report/ and clears test-results/.
            - name: Upload test report
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 14

            - name: Run visual inventory
              if: ${{ !cancelled() }}
              run: PW_VISUAL=1 bunx playwright test --project=visual

            - name: Upload visual inventory
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@v4
              with:
                  name: visual-inventory
                  path: |
                      test-results/visual-inventory/
                      playwright-report/
                  retention-days: 14

    deploy:
        name: Deploy (Railway)
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: [e2e]
        # Only deploy on pushes to main (not PRs). The deploy step itself is a
        # no-op until a RAILWAY_TOKEN repo secret exists, so forks and clones
        # without Railway configured stay green.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
            RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - name: Deploy to Railway
              if: ${{ env.RAILWAY_TOKEN != '' }}
              # `railway up` builds the Dockerfile and runs the startCommand from
              # railway.json (npm run start:migrate), so migrations apply on boot.
              # Use a project-scoped token; set RAILWAY_SERVICE if the project has
              # more than one service.
              run: bunx @railway/cli up --ci ${RAILWAY_SERVICE:+--service "$RAILWAY_SERVICE"}
              env:
                  RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
            - name: Skipped (no RAILWAY_TOKEN)
              if: ${{ env.RAILWAY_TOKEN == '' }}
              run: echo "RAILWAY_TOKEN not set — skipping deploy. Add it in repo secrets to enable."
