name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

env:
    DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iridium_test
    VOLTAGENT_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/voltagent_test
    BETTER_AUTH_SECRET: test-secret-do-not-use-in-production!!
    BETTER_AUTH_BASE_URL: http://localhost:5173
    ANTHROPIC_API_KEY: test-key-not-used-in-e2e

jobs:
    validate:
        name: Typecheck + Lint + Format
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Generate Prisma client
              run: bunx --bun prisma generate
            - name: Validate
              run: bun run validate

    unit:
        name: Unit Tests
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Generate Prisma client
              run: bunx --bun prisma generate
            - name: Run unit tests
              run: bun run test

    e2e:
        name: Playwright
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: [validate, unit]

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: iridium_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            voltagent:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: voltagent_test
                ports:
                    - 5433:5432
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Generate Prisma client
              run: bunx --bun prisma generate

            - name: Run migrations
              run: bunx --bun prisma migrate deploy

            - name: Install Playwright browsers
              run: bunx playwright install --with-deps chromium

            - name: Run e2e tests
              run: bunx playwright test --project=chromium

            - name: Upload test report
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 14
